{% extends "_base.html" %}
{% load static %}
{% block head %}
    <link href="{% static 'pdfjs/web/viewer.css' %}" rel="stylesheet">
    <script src="{% static 'pdfjs/build/pdf.js' %}"></script>
{% endblock head %}
{% block content %}
    <div class="row">
     <div id="pdf-viewer">
        <iframe src="{% static 'pdfjs/web/viewer.html' %}?file={{ pdf_url }}" width="100%" height="600px" frameborder="0"></iframe>
    </div>
</div>
{% endblock content %}
